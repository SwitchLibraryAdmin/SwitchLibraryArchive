<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:description" content="Scene status, latest releases, and Switch homebrew resources.">

  <meta property="og:site_name" content="SwitchHack">

  <link rel="preload" href="assets/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="assets/css/tailwind.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    /* ── heartbeat ── */
    @keyframes pulse-glow {
      0%   { box-shadow: 0 0 0 0 rgba(0,228,97,.5); }
      70%  { box-shadow: 0 0 0 5px rgba(0,228,97,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,228,97,0); }
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00e461;
      animation: pulse-glow 2s ease-out infinite;
      flex-shrink: 0;
    }

    /* Skeleton shimmer */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 3px;
      display: block;
    }

    /* Line clamp */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.14); }

    /* ── glass surface ── */
    .glass {
      background: rgba(15,23,42,.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(71,85,105,.6);
    }
    .glass-bright {
      background: rgba(30,41,59,.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(71,85,105,.7);
    }

    /* ── hide scrollbar ── */
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }

    /* ── patch missing Tailwind col-span utilities ── */
    @media (min-width: 1024px) {
      .lg\:col-span-7 { grid-column: span 7 / span 7; }
      .lg\:col-span-5 { grid-column: span 5 / span 5; }
    }


    /* ── Raycast-style directory cards ── */
    .dir-card {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 20px 22px;
      background: rgba(255,255,255,.05);
      height: 168px;
      position: relative;
      text-decoration: none;
      transition: background .15s ease, border-color .15s ease;
      overflow: hidden;
    }
    .dir-card:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.11);
    }

    /* ── REC pill — frosted glass badge ── */
    .rec-pill {
      position: relative;
      display: inline-flex;
      align-items: center;
      background: rgba(34,211,238,.07);
      border-radius: 9999px;
      padding: 4px 10px;
      font-size: 11px;
      letter-spacing: .03em;
      font-weight: 500;
      color: rgba(165,243,252,.9);
      box-shadow: 0 0 10px rgba(34,211,238,.08);
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rec-pill::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      padding: 1px;
      background: linear-gradient(to bottom, rgba(34,211,238,.5), rgba(34,211,238,.18));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Content cards (guides, communities, scene chatter) ── */
    .content-card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
    }
    .content-card:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.11);
    }
    .content-card .card-desc { color: rgba(255,255,255,.68); }
    .content-card .card-meta { color: rgba(255,255,255,.68); }

    /* Filter pill */
    .filter-pill {
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 9999px;
      border: none;
      color: rgba(148,163,184,1);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s ease;
    }
    .filter-pill:hover {
      color: rgba(226,232,240,1);
      background: rgba(255,255,255,.07);
    }

    /* Directory repo search */
    .directory-search-wrap {
      max-width: 420px;
      background: rgba(15, 23, 42, .38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 9999px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .directory-search-wrap:hover {
      background: rgba(15, 23, 42, .44);
      border-color: rgba(148, 163, 184, .26);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 0 1px rgba(148,163,184,.08);
    }
    .directory-search-wrap:focus-within {
      border-color: rgba(34, 211, 238, .45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 0 0 2px rgba(34, 211, 238, .12);
    }
    #directory-repo-search {
      background: transparent !important;
      border: 0;
      box-shadow: none !important;
      color: rgba(241, 245, 249, 1);
      -webkit-appearance: none;
      appearance: none;
    }
    #directory-repo-search::placeholder {
      color: rgba(100, 116, 139, 1);
    }
    #directory-repo-search:-webkit-autofill,
    #directory-repo-search:-webkit-autofill:hover,
    #directory-repo-search:-webkit-autofill:focus {
      -webkit-text-fill-color: rgba(241, 245, 249, 1);
      -webkit-box-shadow: 0 0 0px 1000px rgba(2, 6, 23, .92) inset !important;
      transition: background-color 5000s ease-in-out 0s;
    }
    /* Header telemetry alignment */
    #directory-header-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #directory-header-row > #status-bar-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      text-align: left;
    }
    @media (min-width: 1024px) {
      #directory-header-row {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      #directory-header-row > #status-bar-inner {
        margin-left: auto;
        justify-content: flex-end;
        text-align: right;
        max-width: 52%;
      }
    }

    /* ── row grid (Finder list view) ── */
    .feed-row {
      display: grid;
      grid-template-columns: 32px 1fr auto auto;
      column-gap: 8px;
      align-items: center;
      min-height: 44px;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    @media (min-width: 640px) {
      .feed-row {
        grid-template-columns: 36px 1fr auto auto;
        column-gap: 12px;
        min-height: 48px;
        padding: 12px 14px;
      }
    }
    a.feed-row { cursor: pointer; }
    .feed-row:last-child { border-bottom: none; }

    /* ── zebra striping ── */
    .feed-row:nth-child(even) { background: rgba(255,255,255,.05); }
    .feed-row:hover { background: rgba(255,255,255,.08); }
    .feed-row:nth-child(even):hover { background: rgba(255,255,255,.12); }

    /* ── new-item indicator ── */
    .row-new { box-shadow: inset 3px 0 0 #38bdf8; }

    /* ── tooltip in title cell ── */
    .title-cell .tip { visibility: hidden; opacity: 0; transition: .1s; }
    .title-cell:hover .tip { visibility: visible; opacity: 1; }

    /* ── SVG Switch Circuit Animations (Forced Cache Bypass) ── */
    .circuit-architecture {
      offset-anchor: 100% 50%;
      offset-rotate: auto; /* Forces the comet tail to follow the curves */
      animation: animation-path infinite cubic-bezier(0.75, -0.01, 0, 0.99) both;
    }

    .circuit-line-1 { offset-path: path("M 10 20 h 79.5 q 5 0 5 5 v 30"); animation-duration: 5s; animation-delay: 1s; }
    .circuit-line-2 { offset-path: path("M 180 10 h -69.7 q -5 0 -5 5 v 40"); animation-duration: 2s; animation-delay: 6s; }
    .circuit-line-3 { offset-path: path("M 130 20 v 21.8 q 0 5 -5 5 h -25"); animation-duration: 6s; animation-delay: 4s; }
    .circuit-line-4 { offset-path: path("M 170 80 v -21.8 q 0 -5 -5 -5 h -65"); animation-duration: 3s; animation-delay: 3s; }
    .circuit-line-5 { offset-path: path("M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -35"); animation-duration: 4s; animation-delay: 9s; }
    .circuit-line-6 { offset-path: path("M 94.8 95 v -46"); animation-duration: 7s; animation-delay: 3s; }
    .circuit-line-7 { offset-path: path("M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 28"); animation-duration: 4s; animation-delay: 4s; }
    .circuit-line-8 { offset-path: path("M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 35"); animation-duration: 3s; animation-delay: 3s; }

    @keyframes animation-path {
      0% { offset-distance: 0%; opacity: 0; }
      5% { opacity: 1; }
      95% { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
  </style>
</head>

  <body class="bg-slate-900 text-gray-200 font-sans antialiased min-h-screen flex flex-col selection:bg-cyan-500/30">

  <!-- SHARED NAV -->
  <div id="nav-container"></div>
  <script src="assets/js/nav.js"></script>
  <div class="h-16"></div>


  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  MAIN                                                     -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 pt-3 sm:pt-4 pb-6">

    <section id="resource-directory">

          <!-- Header -->
          <div id="directory-header-row" class="mb-5 sm:mb-6">
            <div id="directory-header-copy">
              <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight" style="letter-spacing:-.03em;background:linear-gradient(135deg,#ffffff 0%,#22d3ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Software Directory</h1>
              <p class="text-[12px] text-slate-400 mt-1.5" style="max-width:36em">Curated homebrew apps and tools for Nintendo Switch<br>Tracked and updated automatically</p>
            </div>
            <div id="status-bar-inner" class="mt-1 lg:mt-0 flex flex-wrap items-center" style="justify-content:flex-end;text-align:right;column-gap:10px;row-gap:5px">
              <!-- Populated by directory.js renderStatusBar() -->
              <div class="h-4 w-44 skel rounded-sm" style="margin-left:auto"></div>
            </div>
          </div>

          <!-- Filter bar + directory grid -->
          <div class="mb-10">
            <div class="mb-4">
              <label for="directory-repo-search" class="sr-only">Search repositories</label>
              <div class="directory-search-wrap relative flex items-center w-full px-4 py-2.5">
                <svg class="h-4 w-4 text-slate-400 mr-2 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input
                  id="directory-repo-search"
                  type="text"
                  placeholder="Search repositories..."
                  autocomplete="off"
                  class="w-full text-sm focus:outline-none"
                >
              </div>
            </div>
            <div id="directory-filter-bar" class="flex items-center gap-1.5 overflow-x-auto mb-4 scrollbar-hide">
              <button class="filter-pill" data-cat="all">All</button>
              <button class="filter-pill" data-cat="rec">REC</button>
              <button class="filter-pill" data-cat="core">Core System</button>
              <button class="filter-pill" data-cat="files">File &amp; Save</button>
              <button class="filter-pill" data-cat="overlays">Overlays &amp; Perf</button>
              <button class="filter-pill" data-cat="system">System Modules</button>
              <button class="filter-pill" data-cat="apps">Apps &amp; Utils</button>
              <button class="filter-pill" data-cat="media">Streaming &amp; Media</button>
              <button class="filter-pill" data-cat="emulation">Emulation</button>
            </div>
            <div id="dir-repos">
              <!-- Populated by directory.js renderCoreReposDirectory() -->
              <div class="h-8 w-48 skel rounded mb-3"></div>
              <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">
                <div class="h-20 skel rounded-md"></div>
                <div class="h-20 skel rounded-md"></div>
                <div class="h-20 skel rounded-md"></div>
              </div>
            </div>
          </div>

    </section>

  </main>


  <!-- FOOTER -->
  <footer class="border-t border-white/[.07] py-10 mt-6">

      <div class="flex items-center gap-2">
        <span class="font-sans font-extrabold text-white" style="letter-spacing:-.03em">Switch<span class="text-cyan-400">Hack</span></span>
        <span class="text-gray-700 text-sm">&copy; 2026</span>
      </div>
      <div class="flex items-center gap-5 text-sm text-gray-400">
        <a href="/" class="hover:text-gray-300 transition-colors">Home</a>
        <a href="/guide/" class="hover:text-gray-300 transition-colors">Guide</a>
        <a href="/about/" class="hover:text-gray-300 transition-colors">About</a>
        <a href="/legal/" class="hover:text-gray-300 transition-colors">Legal</a>

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then((reg) => {
