  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg:          #0a0a0b;
      --surface:     #111113;
      --surface-2:   #18181b;
      --border:      #1e1e22;
      --border-hi:   #2a2a2e;
      --muted:       #71717a;
      --text:        #e4e4e7;
      --accent:      #06B6D4;
      --accent-hi:   #22D3EE;
      --accent-dim:  rgba(6, 182, 212, 0.09);
      --accent-tint: rgba(6, 182, 212, 0.06);
      --warn-mid:    #EAB308;
      --warn:        #EF4444;
    }

    /* ─── Base Reset ─── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Custom Checkbox ─── */
    .mod-check { display: none; }
    .mod-check + .check-box {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border-hi);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }
    .mod-check:checked + .check-box {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .mod-check:checked + .check-box::after {
      content: '✓';
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    /* ─── Module Row ─── */
    .mod-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      border-left: 2px solid transparent;
      transition: background 0.12s ease;
    }
    .mod-row:not(.last-in-group) { border-bottom: 0; }
    .mod-row:hover { background: var(--surface-2); }
    .mod-row.selected {
      border-left-color: var(--accent);
      background: var(--accent-tint);
    }

    /* ─── Badges ─── */
    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      line-height: 1.4;
    }
    .badge-required {
      color: var(--accent);
      border: 1px solid rgba(6, 182, 212, 0.3);
      background: rgba(6, 182, 212, 0.06);
    }
    .badge-recommended {
      color: var(--muted);
      border: 1px solid var(--border-hi);
    }

    /* ─── RAM display helpers ─── */
    .ram-high { color: var(--warn);     font-weight: 700; }
    .ram-mid  { color: var(--warn-mid); font-weight: 700; }
    .ram-low  { color: var(--muted);    opacity: 0.55; }

    /* ─── Sidebar dot ─── */
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-high { background: var(--warn); }
    .dot-mid  { background: var(--warn-mid); }
    .dot-low  { background: var(--accent); }

    /* ─── RAM Bar ─── */
    .ram-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.38s cubic-bezier(0.4, 0, 0.2, 1), background 0.38s ease;
    }

    /* ─── Search Input ─── */
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 44px 10px 16px;
      outline: none;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: rgba(6, 182, 212, 0.45); }

    /* ─── Filter Buttons ─── */
    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 10px 14px;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .filter-btn:hover {
      color: var(--accent);
      border-color: rgba(6, 182, 212, 0.35);
    }

    /* ─── Category Header ─── */
    .cat-line {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .cat-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-left: 14px;
    }

    /* ─── Build Button ─── */
    @keyframes buildPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.5); }
      50%       { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
    }

    .build-btn {
      width: 100%;
      padding: 15px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 2px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .build-btn:not(:disabled):hover {
      background: var(--accent);
      color: var(--bg);
      animation: buildPulse 1.5s ease-in-out infinite;
    }
    .build-btn:disabled {
      border-color: var(--border-hi);
      background: var(--surface);
      color: var(--muted);
      cursor: not-allowed;
      animation: none;
    }
    .build-btn.state-success {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
      animation: none;
    }
    .build-btn.state-error {
      border-color: var(--warn);
      background: rgba(239, 68, 68, 0.08);
      color: var(--warn);
      animation: none;
    }

    /* ─── Sidebar selected item ─── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .sel-item { animation: slideIn 0.18s ease-out; }

    .sel-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(30, 30, 34, 0.8);
      transition: background 0.1s ease;
    }
    .sel-item-row:hover { background: var(--surface-2); }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      padding: 0 2px;
      opacity: 0;
      transition: color 0.12s ease, opacity 0.12s ease;
      line-height: 1;
    }
    .sel-item-row:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { color: var(--warn); }

    /* ─── Sidebar divider ─── */
    .sidebar-rule {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 22px;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ─── Layout ─── */
    .layout-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
    }

    .left-panel {
      width: 100%;
      padding: 32px 0;
      min-height: 100vh;
    }

    .right-panel {
      display: none;
      flex-shrink: 0;
    }

    @media (min-width: 1024px) {
      .left-panel {
        width: 70%;
        padding-right: 36px;
        border-right: 1px solid var(--border);
      }
      .right-panel {
        display: block;
        width: 30%;
        padding: 32px 0 32px 36px;
      }
    }

    /* ─── Page Header ─── */
    .page-header {
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(17,17,19,0.7) 0%, transparent 100%);
    }
    .page-header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ─── Mobile Bottom Bar ─── */
    .mobile-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(17, 17, 19, 0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transform: translateY(100%);
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mobile-bar.visible { transform: translateY(0); }
    @media (min-width: 1024px) { .mobile-bar { display: none; } }

    .mobile-build-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 9px 20px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .mobile-build-btn:hover { background: var(--accent-hi); }
  </style>
</head>

  <!-- ═══════════════════════════════════════════
       LOGIC
  ═══════════════════════════════════════════ -->
  <script>
    /* ── State ── */
    const selected = new Set();

    /* ─────────────────────────────────────────
       Helpers
    ───────────────────────────────────────── */

    function fmtRam(ram_kb) {
      if (ram_kb === 0) return '—';
      if (ram_kb >= 1024) return (ram_kb / 1024).toFixed(1) + ' MB';
      return ram_kb + ' KB';
    }

    function ramClass(ram_kb) {
      if (ram_kb >= 4096) return 'ram-high';
      if (ram_kb >= 1024) return 'ram-mid';
      return 'ram-low';
    }

    function dotClass(ram_kb) {
      if (ram_kb >= 4096) return 'dot dot-high';
      if (ram_kb >= 1024) return 'dot dot-mid';
      return 'dot dot-low';
    }

    // Safe HTML escape — all user-derived data goes through this before innerHTML
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ─────────────────────────────────────────
       Public API — wire to your backend here
    ───────────────────────────────────────── */

    /**
     * Returns the full module objects for all currently selected modules.
     * Use this to build your POST body: getSelectedModules().map(m => m.id)
     */
    function getSelectedModules() {
      return MODULE_CATALOG.filter(m => selected.has(m.id));
    }

    /* ─────────────────────────────────────────
       Render
    ───────────────────────────────────────── */

    function renderModules() {
      const container = document.getElementById('moduleList');
      const categories = [...new Set(MODULE_CATALOG.map(m => m.category))];

      container.innerHTML = categories.map(cat => {
        const mods = MODULE_CATALOG.filter(m => m.category === cat);
        return `
          <section style="margin-bottom:36px;" data-cat="${esc(cat)}">
            <div class="cat-line">
              <h2 style="font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
                         text-transform:uppercase; letter-spacing:0.22em; color:var(--muted); margin:0;">
                ${esc(cat)}
              </h2>
            </div>
            <div>
              ${mods.map((m, i) => {
                const isReq = m.tags.includes('required');
                const isRec = m.tags.includes('recommended');
                const isLast = i === mods.length - 1;
                return `
                  <label
                    data-id="${esc(m.id)}"
                    class="mod-row${isLast ? ' last-in-group' : ''}${isReq ? ' selected' : ''}"
                  >
                    <input
                      type="checkbox"
                      class="mod-check"
                      value="${esc(m.id)}"
                      ${isReq ? 'checked' : ''}
                      onchange="toggleModule('${esc(m.id)}', this.checked)"
                    />
                    <div class="check-box" style="margin-top:2px;"></div>
                    <div style="flex:1; min-width:0;">
                      <div style="display:flex; align-items:center; gap:7px; flex-wrap:wrap;">
                        <span style="font-weight:700; font-size:14px; color:rgba(255,255,255,0.95); letter-spacing:-0.01em;">
                          ${esc(m.name)}
                        </span>
                        ${isReq ? '<span class="badge badge-required">Required</span>' : ''}
                        ${isRec ? '<span class="badge badge-recommended">Recommended</span>' : ''}
                      </div>
                      <p style="font-size:12px; color:var(--muted); margin:4px 0 0; line-height:1.55; font-weight:300;">
                        ${esc(m.desc)}
                      </p>
                    </div>
                    <div style="flex-shrink:0; margin-top:2px;">
                      <span class="${ramClass(m.ram_kb)}" style="font-family:'JetBrains Mono',monospace; font-size:11px;">
                        ${fmtRam(m.ram_kb)}
                      </span>
                    </div>
                  </label>
                `;
              }).join('')}
            </div>
          </section>
        `;
      }).join('');

      // Pre-select required modules
      MODULE_CATALOG.filter(m => m.tags.includes('required')).forEach(m => selected.add(m.id));
      updateSidebar();
    }

    /* ─────────────────────────────────────────
       Toggle
    ───────────────────────────────────────── */

    function toggleModule(id, checked) {
      const mod = MODULE_CATALOG.find(m => m.id === id);
      if (!mod) return;

      // Lock required modules
      if (mod.tags.includes('required') && !checked) {
        const cb = document.querySelector(`input[value="${CSS.escape(id)}"]`);
        if (cb) cb.checked = true;
        return;
      }

      checked ? selected.add(id) : selected.delete(id);
      updateRow(id, checked);
      updateSidebar();
    }

    function updateRow(id, on) {
      const row = document.querySelector(`label[data-id="${CSS.escape(id)}"]`);
      if (!row) return;
      if (on) {
        row.classList.add('selected');
      } else {
        row.classList.remove('selected');
      }
    }

    function removeMod(id) {
      selected.delete(id);
      const cb = document.querySelector(`input[value="${CSS.escape(id)}"]`);
      if (cb) cb.checked = false;
      updateRow(id, false);
      updateSidebar();
    }

    /* ─────────────────────────────────────────
       Sidebar
    ───────────────────────────────────────── */

    function updateSidebar() {
      const mods = getSelectedModules();
      const totalKb = mods.reduce((s, m) => s + m.ram_kb, 0);
      const pct = Math.min((totalKb / MAX_RAM_KB) * 100, 100);

      // RAM numbers
      const displayRam = totalKb === 0 ? '0 KB' : fmtRam(totalKb);
      document.getElementById('ramUsed').textContent = displayRam;
      document.getElementById('ramPercent').textContent = Math.round(pct) + '%';

      // RAM bar color
      const bar = document.getElementById('ramBar');
      bar.style.width = pct + '%';
      bar.style.background = pct > 80 ? 'var(--warn)' : pct > 60 ? 'var(--warn-mid)' : 'var(--accent)';

      // High RAM warning
      document.getElementById('ramWarning').style.opacity = pct > 80 ? '1' : '0';

      // Selected list
      const list = document.getElementById('selectedList');
      const emptyEl = document.getElementById('emptyState');

      if (mods.length === 0) {
        list.innerHTML = '';
        list.appendChild(emptyEl);
        emptyEl.style.display = '';
      } else {
        if (emptyEl) emptyEl.style.display = 'none';
        list.innerHTML = mods.map(m => `
          <div class="sel-item sel-item-row">
            <div style="display:flex; align-items:center; gap:8px; min-width:0; overflow:hidden;">
              <span class="${dotClass(m.ram_kb)}"></span>
              <span style="font-size:12px; color:rgba(255,255,255,0.82); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                ${esc(m.name)}
              </span>
            </div>
            <div style="display:flex; align-items:center; gap:8px; flex-shrink:0; margin-left:8px;">
              <span style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);">
                ${fmtRam(m.ram_kb)}
              </span>
              ${!m.tags.includes('required')
                ? `<button class="remove-btn" onclick="event.stopPropagation(); removeMod('${esc(m.id)}')" aria-label="Remove ${esc(m.name)}">✕</button>`
                : `<span style="width:15px; display:inline-block;"></span>`
              }
            </div>
          </div>
        `).join('');
      }

      // Module count
      document.getElementById('selCount').textContent =
        mods.length + ' module' + (mods.length !== 1 ? 's' : '');

      // Build button
      document.getElementById('buildBtn').disabled = mods.length === 0;

      // Mobile bar
      const mobRamStr = totalKb === 0 ? '0 KB'
        : totalKb >= 1024 ? (totalKb / 1024).toFixed(1) + ' MB'
        : totalKb + ' KB';
      document.getElementById('mobRam').textContent = mobRamStr;
      document.getElementById('mobCount').textContent = mods.length;
      document.getElementById('mobileBar').classList.toggle('visible', mods.length > 0);
    }

    /* ─────────────────────────────────────────
       Utilities
    ───────────────────────────────────────── */

    function selectAll() {
      MODULE_CATALOG.forEach(m => {
        selected.add(m.id);
        const cb = document.querySelector(`input[value="${CSS.escape(m.id)}"]`);
        if (cb) cb.checked = true;
        updateRow(m.id, true);
      });
      updateSidebar();
    }

    function deselectAll() {
      MODULE_CATALOG.forEach(m => {
        if (m.tags.includes('required')) return;
        selected.delete(m.id);
        const cb = document.querySelector(`input[value="${CSS.escape(m.id)}"]`);
        if (cb) cb.checked = false;
        updateRow(m.id, false);
      });
      updateSidebar();
    }

    /* ─────────────────────────────────────────
       Search
    ───────────────────────────────────────── */

    document.getElementById('searchInput').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim();
      MODULE_CATALOG.forEach(m => {
        const row = document.querySelector(`label[data-id="${CSS.escape(m.id)}"]`);
        if (!row) return;
        const visible = !q
          || m.name.toLowerCase().includes(q)
          || m.desc.toLowerCase().includes(q)
          || m.category.toLowerCase().includes(q);
        row.style.display = visible ? '' : 'none';
      });
      // Hide sections with no visible rows
      document.querySelectorAll('[data-cat]').forEach(sec => {
        const anyVisible = sec.querySelectorAll('label:not([style*="display: none"])').length > 0;
        sec.style.display = anyVisible ? '' : 'none';
      });
    });

    /* ─────────────────────────────────────────
       Keyboard shortcut: "/" → focus search
    ───────────────────────────────────────── */

    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
    });

    /* ─────────────────────────────────────────
       Build Action
       ─ Replace the fetch block below with your
         real API call when ready.
    ───────────────────────────────────────── */

    document.getElementById('buildBtn').addEventListener('click', doBuild);

      btn.textContent = 'BUILDING…';
      btn.disabled = true;
      btn.classList.remove('state-success', 'state-error');

      try {

        //   body: JSON.stringify({
        //     modules: modules.map(m => ({ id: m.id, owner: m.owner, repo: m.repo })),
        //   }),
        // });
        // if (!res.ok) throw new Error(await res.text());
        // const { downloadUrl } = await res.json();
        // window.location.href = downloadUrl;
        //
        // ── END BACKEND BLOCK ─────────────────────────────────────────────

        // Remove this mock when wiring real API:
        await new Promise(r => setTimeout(r, 1500));

        btn.textContent = '✓ PACKAGE READY';
        btn.classList.add('state-success');
        setTimeout(() => {
          btn.textContent = 'Build SD Card →';
          btn.classList.remove('state-success');
          btn.disabled = false;
        }, 2500);

      } catch (err) {
        console.error('[builder] build failed:', err);
        btn.textContent = '✕ BUILD FAILED';
        btn.classList.add('state-error');

          btn.classList.remove('state-error');
          btn.disabled = false;
        }, 2500);

    /* ─────────────────────────────────────────
       Init
    ───────────────────────────────────────── */
    renderModules();
  </script>

</body>
